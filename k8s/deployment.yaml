apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digital-vault
  template:
    metadata:
      labels:
        app: digital-vault
    spec:
      containers:
      - name: frontend
        image: digital-vault-frontend:latest
        ports:
        - containerPort: 80
      - name: backend
        image: digital-vault-backend:latest
        ports:
        - containerPort: 5000
