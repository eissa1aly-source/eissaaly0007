version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_password
      POSTGRES_DB: vault_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://vault_user:vault_password@postgres:5432/vault_db
      JWT_SECRET: ${JWT_SECRET:-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-secret-key-32-bytes}
    depends_on:
      - postgres
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  postgres_data:
