version: '3.8'

services:
  # ============================================================
  # 🗄️ قاعدة البيانات
  # ============================================================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_password
      POSTGRES_DB: vault_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 🚀 التطبيق الرئيسي
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://vault_user:vault_password@postgres:5432/vault_db
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-32-character-key}
      - DISABLE_HMR=true
      - WATCH=false
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
